services:
  web:
    build: .
    container_name: innovativeais_backend
    command: gunicorn backend.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers=4
    ports:
    - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - redis
      - rabbitmq
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1

  nginx:
    image: nginx:alpine
    container_name: innovativeais_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    restart: always

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  redis:
    image: redis:alpine
    container_name: 
    expose:
      - "6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: innovativeais_rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    expose:
      - "5672"
      - "15672"

  celery_worker:
    build: .
    container_name: innovativeais_celery_worker
    command: celery -A backend worker -l info
    volumes:
      - .:/app
    depends_on:
      - innovativeais_redis
      - rabbitmq
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  celery_beat:
    build: .
    container_name: innovativeais_celery_beat
    command: celery -A backend beat -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - rabbitmq
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings

volumes:
  static_volume:
  media_volume:
