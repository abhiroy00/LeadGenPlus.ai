name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-backend:${{ env.IMAGE_TAG }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-frontend:${{ env.IMAGE_TAG }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_SERVER_IP }}
          username: ubuntu
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /home/ubuntu/leadgenplus
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm \
              backend python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            sleep 10
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps celery_worker
            docker compose -f docker-compose.prod.yml up -d --no-deps daphne
            docker image prune -f
            echo "✅ Production deploy done! Version: $IMAGE_TAG"

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "${{ job.status == 'success' && '✅' || '❌' }} Production deploy ${{ job.status }}! Version: ${{ env.IMAGE_TAG }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}