name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      # ── Docker Hub Login ───────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build + Push Backend Image ─────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-backend:${{ env.IMAGE_TAG }}

      # ── Build + Push Frontend Image ────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/leadgenplus-frontend:${{ env.IMAGE_TAG }}

      # ── Deploy to Server (DISABLED until EC2 is ready) ─
      # Uncomment this block when your EC2 server is set up
      # - name: Deploy to production
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host:     ${{ secrets.PROD_SERVER_IP }}
      #     username: ubuntu
      #     key:      ${{ secrets.PROD_SSH_KEY }}
      #     script: |
      #       cd /home/ubuntu/leadgenplus
      #       docker compose -f docker-compose.prod.yml pull
      #       docker compose -f docker-compose.prod.yml up -d
      #       docker image prune -f

      # ── Notify Result ──────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "======================================"
          echo "Build Status: ${{ job.status }}"
          echo "Image Tag:    ${{ env.IMAGE_TAG }}"
          echo "Images pushed to Docker Hub ✅"
          echo "Deploy to EC2: PENDING (server not set up yet)"
          echo "======================================"